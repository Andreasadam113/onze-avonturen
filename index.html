<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onze Avonturen 🌿</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="header-deco">✦ ✦ ✦</div>
  <h1>Onze <em>Avonturen</em></h1>
  <p>Een lijstje voor ons twee 🌿</p>
</header>

<div class="divider"><span>❧</span></div>

<div class="add-section">
  <div class="add-box">
    <h2>Voeg een avontuur toe</h2>
    <div class="emoji-pick" id="emojiPick"></div>
    <div class="form-row">
      <input type="text" id="titleInput" placeholder="Bijv. Kamperen in de Ardennen…" maxlength="80" />
      <button class="btn-add" onclick="addItem()">Toevoegen</button>
    </div>
  </div>
</div>

<div class="filter-row">
  <button class="filter-btn active" onclick="setFilter('all', this)">Alles</button>
  <button class="filter-btn" onclick="setFilter('todo', this)">Nog te doen</button>
  <button class="filter-btn" onclick="setFilter('done', this)">Gedaan 🎉</button>
</div>

<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>

<footer>Gemaakt met ❤︎ voor ons</footer>

<script>
  const BIN_ID  = '69e6955a856a6821895533b6';
  const API_KEY = '$2a$10$vui16SKvJgX7XGY9qghvoO03Q/7LNIXUpJrjYArSHbd4TV7kN4ymu';
  const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
  const HEADERS = { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY };

  const EMOJIS = ['🏕️','🚗','🍽️','🌲','🏖️','🎡','🎬','🧁','🚴','🌅','⛵','🎭','🍦','🛶','🌸','🏔️'];
  const DRAFT_KEY = 'onze-avonturen-draft';
  let selectedEmoji = EMOJIS[0];
  let filter = 'all';
  let items = [];

  // ── JSONBin lezen ──
  async function load() {
    document.getElementById('grid').innerHTML = `<div class="empty"><span>🌿</span>Laden…</div>`;
    try {
      const res  = await fetch(BIN_URL + '/latest', { headers: { 'X-Master-Key': API_KEY } });
      const data = await res.json();
      items = Array.isArray(data.record) ? data.record : [];
    } catch (e) {
      console.error('Laden mislukt', e);
    }
    render();
  }

  // ── JSONBin opslaan ──
  async function save() {
    try {
      await fetch(BIN_URL, {
        method: 'PUT',
        headers: HEADERS,
        body: JSON.stringify(items)
      });
    } catch (e) {
      console.error('Opslaan mislukt', e);
    }
  }

  // ── Emoji picker ──
  const pick = document.getElementById('emojiPick');
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn' + (e === selectedEmoji ? ' active' : '');
    btn.textContent = e;
    btn.onclick = () => {
      selectedEmoji = e;
      document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    pick.appendChild(btn);
  });

  function setFilter(f, el) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  async function addItem() {
    const input = document.getElementById('titleInput');
    const title = input.value.trim();
    if (!title) { input.focus(); return; }
    items.unshift({ id: Date.now(), title, emoji: selectedEmoji, done: false });
    input.value = '';
    localStorage.removeItem(DRAFT_KEY);
    render();
    await save();
  }

  const titleInput = document.getElementById('titleInput');
  titleInput.value = localStorage.getItem(DRAFT_KEY) || '';
  titleInput.addEventListener('input', e => {
    localStorage.setItem(DRAFT_KEY, e.target.value);
  });
  titleInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  async function toggleDone(id) {
    const item = items.find(i => i.id === id);
    if (item) item.done = !item.done;
    render();
    await save();
  }

  async function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    render();
    await save();
  }

  function render() {
    const done  = items.filter(i => i.done).length;
    const total = items.length;
    document.getElementById('stats').innerHTML =
      `<strong>${done}</strong> van <strong>${total}</strong> avonturen beleefd`;

    let visible = items;
    if (filter === 'todo') visible = items.filter(i => !i.done);
    if (filter === 'done') visible = items.filter(i => i.done);

    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    if (visible.length === 0) {
      grid.innerHTML = `<div class="empty"><span>🌿</span>Nog niets hier…</div>`;
      return;
    }

    visible.forEach((item, idx) => {
      const card = document.createElement('div');
      card.className = 'card' + (item.done ? ' done' : '');
      card.style.animationDelay = (idx * 0.05) + 's';
      card.innerHTML = `
        <div class="done-badge">✓</div>
        <span class="card-emoji">${item.emoji}</span>
        <div class="card-title">${escHtml(item.title)}</div>
        <div class="card-footer">
          <button class="check-btn" onclick="toggleDone(${item.id})">
            ${item.done ? '✓ Gedaan!' : '○ Doen'}
          </button>
          <button class="delete-btn" onclick="deleteItem(${item.id})" title="Verwijderen">✕</button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Laad bij openen + ververs automatisch elke 30 seconden
  load();
  setInterval(load, 30000);
</script>
</body>
</html>
