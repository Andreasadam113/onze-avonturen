<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onze Avonturen 🌿</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="header-deco">✦ ✦ ✦</div>
  <h1>Onze <em>Avonturen</em></h1>
  <p>Een lijstje voor ons twee 🌿</p>
</header>

<div class="divider"><span>❧</span></div>

<div class="add-section">
  <div class="add-box">
    <h2>Voeg een avontuur toe</h2>
    <div class="emoji-pick" id="emojiPick"></div>
    <div class="form-row">
      <input type="text" id="titleInput" placeholder="Bijv. Kamperen in de Ardennen…" maxlength="80" />
      <button class="btn-add" onclick="addItem()">Toevoegen</button>
    </div>
  </div>
</div>

<div class="filter-row">
  <button class="filter-btn active" onclick="setFilter('all', this)">Alles</button>
  <button class="filter-btn" onclick="setFilter('todo', this)">Nog te doen</button>
  <button class="filter-btn" onclick="setFilter('done', this)">Gedaan 🎉</button>
</div>

<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>

<div class="modal-backdrop" id="deleteModal" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
    <h3 id="deleteModalTitle">Avontuur verwijderen?</h3>
    <p id="deleteModalText">Deze actie kan je niet ongedaan maken.</p>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-secondary" id="cancelDeleteBtn" type="button">Annuleren</button>
      <button class="modal-btn modal-btn-danger" id="confirmDeleteBtn" type="button">Verwijderen</button>
    </div>
  </div>
</div>

<footer>Gemaakt met ❤︎ voor ons</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.public.js"></script>
<script>
  (() => {
  const EMOJIS = ['🏕️','🚗','🍽️','🌲','🏖️','🎡','🎬','🧁','🚴','🌅','⛵','🎭','🍦','🛶','🌸','🏔️'];
  const DRAFT_KEY = 'onze-avonturen-draft';
  const SUPABASE_URL = window.APP_CONFIG?.SUPABASE_URL || '';
  const SUPABASE_ANON_KEY = window.APP_CONFIG?.SUPABASE_ANON_KEY || '';

  let selectedEmoji = EMOJIS[0];
  let filter = 'all';
  let items = [];
  let pendingDeleteId = null;
  let loadStatus = 'Config nodig';
  const visibleLoadStatuses = new Set(['Verbinden…', 'Laden…', 'Bijwerken…']);

  const deleteModal = document.getElementById('deleteModal');
  const deleteModalText = document.getElementById('deleteModalText');
  const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
  const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

  const hasSupabaseConfig =
    SUPABASE_URL.startsWith('https://') &&
    SUPABASE_URL.includes('.supabase.co') &&
    SUPABASE_ANON_KEY.length > 20;

  const supabase = hasSupabaseConfig
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;

  async function fetchItems() {
    if (!supabase) return;
    loadStatus = items.length ? 'Bijwerken…' : 'Laden…';
    render();

    const { data, error } = await supabase
      .from('avonturen')
      .select('id, title, emoji, done, created_at')
      .order('created_at', { ascending: false });

    if (error) {
      console.error('Laden mislukt', error);
      loadStatus = 'Fout';
      render();
      return;
    }

    items = Array.isArray(data) ? data : [];
    loadStatus = '';
    render();
  }

  function setupRealtime() {
    if (!supabase) return;

    supabase
      .channel('avonturen-live')
      .on(
        'postgres_changes',
        { event: '*', schema: 'public', table: 'avonturen' },
        () => {
          fetchItems();
        }
      )
      .subscribe(status => {
        if (status === 'SUBSCRIBED') {
          loadStatus = '';
          render();
        }
        if (status === 'CHANNEL_ERROR') {
          loadStatus = '';
          render();
        }
      });
  }

  // ── Emoji picker ──
  const pick = document.getElementById('emojiPick');
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn' + (e === selectedEmoji ? ' active' : '');
    btn.textContent = e;
    btn.onclick = () => {
      selectedEmoji = e;
      document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    pick.appendChild(btn);
  });

  function setFilter(f, el) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  async function addItem() {
    if (!supabase) return;
    const input = document.getElementById('titleInput');
    const title = input.value.trim();
    if (!title) { input.focus(); return; }

    const payload = {
      title: title.slice(0, 80),
      emoji: selectedEmoji,
      done: false
    };

    const { error } = await supabase.from('avonturen').insert(payload);
    if (error) {
      console.error('Toevoegen mislukt', error);
      loadStatus = 'Fout';
      render();
      return;
    }

    input.value = '';
    localStorage.removeItem(DRAFT_KEY);
    loadStatus = '';
    render();
  }

  const titleInput = document.getElementById('titleInput');
  titleInput.value = localStorage.getItem(DRAFT_KEY) || '';
  titleInput.addEventListener('input', e => {
    localStorage.setItem(DRAFT_KEY, e.target.value);
  });
  titleInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  async function toggleDone(id) {
    if (!supabase) return;
    const item = items.find(i => i.id === id);
    if (!item) return;

    const { error } = await supabase
      .from('avonturen')
      .update({ done: !item.done })
      .eq('id', id);

    if (error) {
      console.error('Bijwerken mislukt', error);
      loadStatus = 'Fout';
      render();
    }
  }

  function openDeleteModal(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    pendingDeleteId = id;
    deleteModalText.textContent = `Weet je zeker dat je "${item.title}" wilt verwijderen?`;
    deleteModal.classList.add('open');
    deleteModal.setAttribute('aria-hidden', 'false');
  }

  function closeDeleteModal() {
    pendingDeleteId = null;
    deleteModal.classList.remove('open');
    deleteModal.setAttribute('aria-hidden', 'true');
  }

  async function confirmDeleteItem() {
    const id = pendingDeleteId;
    if (!supabase || !id) return;
    if (!supabase) return;
    const item = items.find(i => i.id === id);
    if (!item) {
      closeDeleteModal();
      return;
    }

    const { error } = await supabase
      .from('avonturen')
      .delete()
      .eq('id', id);

    if (error) {
      console.error('Verwijderen mislukt', error);
      loadStatus = 'Fout';
      render();
    }

    closeDeleteModal();
  }

  function render() {
    const done = items.filter(i => i.done).length;
    const total = items.length;
    const statusLabel = visibleLoadStatuses.has(loadStatus) ? loadStatus : '';
    document.getElementById('stats').innerHTML =
      `<strong>${done}</strong> van <strong>${total}</strong> avonturen beleefd${statusLabel ? ` <span class="load-status">${statusLabel}</span>` : ''}`;

    let visible = items;
    if (filter === 'todo') visible = items.filter(i => !i.done);
    if (filter === 'done') visible = items.filter(i => i.done);

    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    if (visible.length === 0) {
      grid.innerHTML = `<div class="empty"><span>🌿</span>Nog niets hier…</div>`;
      return;
    }

    visible.forEach((item, idx) => {
      const card = document.createElement('div');
      card.className = 'card' + (item.done ? ' done' : '');
      card.style.animationDelay = (idx * 0.05) + 's';
      card.innerHTML = `
        <div class="done-badge">✓</div>
        <span class="card-emoji">${item.emoji}</span>
        <div class="card-title">${escHtml(item.title)}</div>
        <div class="card-footer">
          <button class="check-btn" onclick='toggleDone(${JSON.stringify(item.id)})'>
            ${item.done ? '✓ Gedaan!' : '○ Doen'}
          </button>
          <button class="delete-btn" onclick='openDeleteModal(${JSON.stringify(item.id)})' title="Verwijderen">✕</button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  if (!supabase) {
    loadStatus = 'Config nodig';
    render();
  } else {
    loadStatus = 'Verbinden…';
    render();
    fetchItems();
    setupRealtime();
  }

  window.addItem = addItem;
  window.setFilter = setFilter;
  window.toggleDone = toggleDone;
  window.openDeleteModal = openDeleteModal;

  cancelDeleteBtn.addEventListener('click', closeDeleteModal);
  confirmDeleteBtn.addEventListener('click', confirmDeleteItem);
  deleteModal.addEventListener('click', e => {
    if (e.target === deleteModal) closeDeleteModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && deleteModal.classList.contains('open')) {
      closeDeleteModal();
    }
  });
  })();
</script>
</body>
</html>
